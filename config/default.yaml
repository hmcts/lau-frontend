---
service:
  name: 'lau-frontend'
environment: 'prod'
useCSRFProtection: true
security:
  referrerPolicy: origin
appInsights:
  connectionString: false
  samplingPercentage: 100 # 100% of all telemetry will be sent to Application Insights
pagination:
  maxPerPage: 100
  maxTotal: 10000
redis:
  host: 'localhost'
  port: 6379
  password: 'dummy_password'
  useTLS: 'false'
  enabled: false
  proxy: true
  resave: false
  saveUninitialized: false
  ttl: 28800 # s (8 hours)
  cookie:
    secure: false
    httpOnly: true
    sameSite: 'lax'
services:
  lau-case-backend:
    enabled: true
    url: 'http://localhost:4550'
    port: 4550
    endpoints:
      caseActivity: '/audit/caseAction'
      caseSearch: '/audit/caseSearch'
      caseAccess: '/audit/accessRequest'
  lau-idam-backend:
    enabled: true
    url: 'http://localhost:4551'
    port: 4551
    endpoints:
      logon: '/audit/logon'
      deletedUsers: '/audit/deletedAccounts'
  lau-eud-backend:
    enabled: true
    url: 'http://localhost:4553'
    endpoints:
      userDetails: /audit/userData
      userAccountUpdates: /audit/userUpdates
  idam-api:
    enabled: true
    authorizationURL: 'https://idam-web-public.aat.platform.hmcts.net/o/authorize'
    endSessionURL: 'https://idam-web-public.aat.platform.hmcts.net/o/endSession'
    url: 'https://idam-api.aat.platform.hmcts.net'
    endpoints:
      token: '/o/token'
    clientID: 'lau'
    scope: 'openid profile roles'
    clientSecret:
    callbackURL: 'https://localhost:4000/oauth2/callback'
  hmcts-access:
    enabled: true
    url: 'https://hmcts-access.aat.platform.hmcts.net'
  s2s:
    enabled: true
    url: 'http://rpe-service-auth-provider-aat.service.core-compute-aat.internal'
    lauSecret:
  auto-suggest:
    data-file: 'data/auto-suggest-data-prod.json'
pages:
  userDetailsEnabled: true
session:
  secret:
  cookieMaxAge: 30 # minutes
is_dev: true
